backend:
  name: git-gateway
  branch: main

media_folder: "images" # المجلد الذي ستُحفظ فيه الصور المرفوعة من الداشبورد
public_folder: "/images"

collections:
  - name: "blog" # قسم المدونة
    label: "Blog Posts"
    folder: "blog"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Featured Image", name: "image", widget: "image" }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "accounting" # التحكم في أسعار المحاسبة
    label: "Accounting Services"
    files:
      - file: "data/accounting.json"
        label: "Pricing & Packages"
        name: "pricing"
        fields:
          - { label: "Startup Lite Price", name: "startup_price", widget: "string" }
          - { label: "VAT Pro Price", name: "vat_price", widget: "string" }
          - { label: "Audit Ready Price", name: "audit_price", widget: "string" }